<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #050816; }

    .title {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 74px;
      font-weight: 900;
      fill: #A855F7;
      letter-spacing: 12px;
      text-anchor: middle;
      dominant-baseline: middle;
      animation: titleGlow 2.2s infinite ease-in-out;
    }

    .slogan {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      font-weight: 600;
      fill: #D8B4FE;
      letter-spacing: 8px;
      text-anchor: middle;
      animation: sloganGlow 3s infinite ease-in-out;
    }

    .square {
      fill: #131b2d;
      animation: gridPulse 4s infinite ease-in-out;
    }

    @keyframes titleGlow {
      0%, 100% { fill: #7C3AED; opacity: .85; }
      50% { fill: #C084FC; opacity: 1; }
    }

    @keyframes sloganGlow {
      0%, 100% { opacity: .6; }
      50% { opacity: 1; }
    }

    @keyframes gridPulse {
      0%, 100% { fill: #131b2d; }
      50% { fill: #7C3AED; }
    }
  </style>

  <rect class="bg" width="100%" height="100%" />

  <g transform="translate(75 58) scale(1.15)">
    <rect class="square" x="0" y="0" width="12" height="12" />
    <rect class="square" x="18" y="0" width="12" height="12" />
    <rect class="square" x="36" y="0" width="12" height="12" />

    <rect class="square" x="0" y="18" width="12" height="12" />
    <rect class="square" x="18" y="18" width="12" height="12" />
    <rect class="square" x="36" y="18" width="12" height="12" />

    <rect class="square" x="0" y="36" width="12" height="12" />
    <rect class="square" x="18" y="36" width="12" height="12" />
    <rect class="square" x="36" y="36" width="12" height="12" />
  </g>

  <text class="title" x="450" y="105">LUMA LABZ</text>

  <text class="slogan" x="450" y="180">QUEM USA SABE</text>
</svg>
