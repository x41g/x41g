<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">

<style>

.bg{
fill:#0d1117;
}

.dot{
fill:#161b22;
}

.glow{
fill:#7c3aed;
animation: pulse 3s infinite;
}

@keyframes pulse{
0%,100%{
opacity:.35;
filter:drop-shadow(0 0 0px #7c3aed);
}

50%{
opacity:1;
filter:drop-shadow(0 0 10px #a855f7);
}
}

text{
fill:#7c3aed;
font-family:system-ui;
font-size:74px;
font-weight:800;
letter-spacing:10px;

animation:
appear 1s ease,
pulse 3s infinite;
}

@keyframes appear{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
}
}

</style>

<rect class="bg" width="100%" height="100%"/>

<!-- contribution grid -->
<g>

<!-- gera aparência dos quadradinhos -->
<g opacity=".55">

<rect class="dot" x="40" y="40" width="12" height="12"/>
<rect class="dot" x="60" y="40" width="12" height="12"/>
<rect class="dot" x="80" y="40" width="12" height="12"/>
<rect class="dot" x="100" y="40" width="12" height="12"/>
<rect class="dot" x="120" y="40" width="12" height="12"/>

<rect class="dot" x="40" y="60" width="12" height="12"/>
<rect class="dot" x="60" y="60" width="12" height="12"/>
<rect class="dot" x="80" y="60" width="12" height="12"/>
<rect class="dot" x="100" y="60" width="12" height="12"/>
<rect class="dot" x="120" y="60" width="12" height="12"/>

<rect class="dot" x="40" y="80" width="12" height="12"/>
<rect class="dot" x="60" y="80" width="12" height="12"/>
<rect class="dot" x="80" y="80" width="12" height="12"/>
<rect class="dot" x="100" y="80" width="12" height="12"/>
<rect class="dot" x="120" y="80" width="12" height="12"/>

</g>

</g>

<text
x="110"
y="135"
class="glow">

LUMA LABZ

</text>

</svg>
